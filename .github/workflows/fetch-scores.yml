name: Fetch World Cup Scores

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  fetch-scores:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch match scores
        id: fetch
        continue-on-error: true
        run: |
          curl -s "https://fancy-block-fde3.aking116.workers.dev/competitions/WC/matches?season=2026" \
            -o data.json \
            --fail --max-time 25 --retry 1 --retry-delay 3

      - name: Fetch top scorers
        id: fetch_scorers
        continue-on-error: true
        run: |
          curl -s "https://fancy-block-fde3.aking116.workers.dev/competitions/WC/scorers?season=2026&limit=200" \
            -o scorers.json \
            --fail --max-time 25 --retry 1 --retry-delay 3

      - name: Track consecutive failures
        if: steps.fetch.outcome == 'failure'
        run: |
          COUNT=0
          if [ -f .fail_count ]; then COUNT=$(cat .fail_count); fi
          COUNT=$((COUNT + 1))
          echo $COUNT > .fail_count
          if [ $COUNT -lt 3 ]; then exit 0; else exit 1; fi

      - name: Reset failure count on success
        if: steps.fetch.outcome == 'success'
        run: echo 0 > .fail_count

      - name: Commit and push if changed
        if: steps.fetch.outcome == 'success'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json scorers.json .fail_count
          git diff --staged --quiet || git commit -m "Update scores $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
