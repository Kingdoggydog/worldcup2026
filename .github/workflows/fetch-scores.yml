name: Fetch World Cup Scores

on:
  schedule:
    # Before the tournament starts, once per day is enough.
    # During live matches, switch back to something like '*/15 * * * *'.
    - cron: '*/15 * * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  fetch-scores:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch scores from API via Cloudflare Worker
        run: |
          curl -s "https://fancy-block-fde3.aking116.workers.dev/competitions/WC/matches?season=2026" \
            -o data.json \
            --fail \
            --max-time 25 \
            --retry 1 \
            --retry-delay 3
          python3 - <<'PY'
          import json
          from pathlib import Path

          data = json.loads(Path("data.json").read_text())
          matches = data.get("matches")
          if not isinstance(matches, list) or len(matches) != 104:
              raise SystemExit(f"Unexpected data.json: matches={len(matches) if isinstance(matches, list) else type(matches).__name__}")
          print(f"Fetched {len(matches)} matches")
          PY

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --staged --quiet || git commit -m "Update scores $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
