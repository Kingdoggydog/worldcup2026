<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>World Cup 2026 Top Scorers - Golden Boot Race</title>
  <meta name="description" content="FIFA World Cup 2026 Golden Boot race - top scorers updated live throughout the tournament.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&display=swap" rel="stylesheet">
  <!-- Open Graph -->
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="World Cup 2026 Schedule">
  <meta property="og:title" content="World Cup 2026 Top Scorers - Golden Boot Race">
  <meta property="og:description" content="Live top scorers updated throughout the FIFA World Cup 2026.">
  <meta property="og:url" content="https://kingdoggydog.github.io/worldcup2026/scorers.html">
  <meta property="og:image" content="https://kingdoggydog.github.io/worldcup2026/preview.png">
  <meta name="twitter:card" content="summary_large_image">
  <style>
    :root {
      --bg: #0A0E1A; --surface: #111827; --border: #1E2840;
      --text: #E8EAF0; --text-sub: #7A82A8; --text-muted: #4A5568;
      --gold: #C9A84C; --win: #2ECC71;
      --ctrl-bg: #1A2235; --ctrl-border: #2A3A55; --ctrl-text: #C8D0E0;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { overflow-x: hidden; width: 100%; }
    body { background: var(--bg); color: var(--text); font-family: 'Barlow Condensed', sans-serif; min-height: 100vh; }
    .page { max-width: 800px; margin: 0 auto; padding: 20px 16px 60px; }
    @media (max-width: 600px) {
      .page { padding: 12px 0px 40px; }
      .scorers-table td, .scorers-table th { padding: 6px 2px; }
      .scorers-table { font-size: 12px; table-layout: fixed; width: 100%; }
      .player-name { font-size: 12.5px; }
      .player-team { font-size: 11px; }
      .col-player { width: 38%; }
      .scorers-table th .sublabel { display: none; }
      .scorers-table th { font-size: 14px; }
    }

    .header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 20px; padding-bottom: 16px; border-bottom: 1px solid var(--border); }
    .header h1 { font-weight: 800; font-size: clamp(22px,5vw,36px); letter-spacing: 1px; text-transform: uppercase; line-height: 1; color: var(--gold); }
    .header .sub { font-size: clamp(11px,2vw,14px); font-weight: 400; letter-spacing: 2px; text-transform: uppercase; color: var(--text-sub); margin-top: 4px; }
    .nav-row { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; }
    .nav-btn { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: clamp(10px,1.5vw,13px); letter-spacing: 0.5px; text-transform: uppercase; padding: 5px 10px; border-radius: 4px; cursor: pointer; border: 1.5px solid var(--ctrl-border); background: var(--ctrl-bg); color: var(--ctrl-text); text-decoration: none; transition: all 0.2s; white-space: nowrap; display: inline-block; }
    .nav-btn:hover { opacity: 0.8; }
    .nav-btn.active { background: var(--gold); color: #0A0E1A; border-color: var(--gold); }

    .scorers-table { width: 100%; border-collapse: separate; border-spacing: 0; }
    .scorers-table th { font-size: 11px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--text-muted); padding: 8px 12px; border-bottom: 2px solid var(--border); text-align: center; }

    /* Legend bar + sticky table header */
    .legend-bar { display: none; }
    .top-mask {
      display: none;
      position: fixed; top: 0; left: 0; right: 0;
      height: 38px;
      background: var(--bg);
      z-index: 20;
      pointer-events: none;
    }
    @media (max-width: 600px) {
      .top-mask { display: block; }
      .scorers-table thead th { top: 38px; }
    }
    .legend-icon { display: inline-block; margin-right: 4px; font-weight: 700; color: var(--gold); }
    .scorers-table thead th {
      position: -webkit-sticky; position: sticky; top: 0; z-index: 10;
      background: var(--bg);
      -webkit-transform: translateZ(0); transform: translateZ(0);
      -webkit-backface-visibility: hidden; backface-visibility: hidden;
    }
    @media (max-width: 600px) {
      .legend-bar {
        display: flex; flex-wrap: wrap; gap: 10px;
        align-items: center;
        padding: 8px 10px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 8px;
        margin-bottom: 12px;
        font-size: 10.5px; color: var(--text-sub);
      }
    }
    .scorers-table th.center { text-align: center; }
    .scorers-table td { padding: 12px 12px; border-bottom: 1px solid var(--border); font-size: 16px; color: var(--text); vertical-align: middle; text-align: center; }
    .scorers-table td.center { text-align: center; }
    .scorers-table td.goals { font-weight: 800; font-size: 20px; color: var(--gold); text-align: center; }
    .scorers-table td.stat { text-align: center; color: var(--text-sub); font-size: 15px; }
    .scorers-table tr:hover td { background: rgba(255,255,255,0.02); }
    .scorers-table tr:first-child td { background: rgba(201,168,76,0.06); }

    .pos { font-size: 13px; color: var(--text-muted); font-weight: 700; text-align: center; width: 30px; }
    .pos.gold { color: #FFD700; }
    .pos.silver { color: #C0C0C0; }
    .pos.bronze { color: #CD7F32; }

    .player-name { font-weight: 700; font-size: 17px; text-align: left; }
    .player-team { font-size: 13px; color: var(--text-sub); margin-top: 2px; display: flex; align-items: center; gap: 4px; justify-content: flex-start; }
    .player-team img { width: 16px; height: 12px; object-fit: contain; }

    .last-updated { font-size: 12px; color: var(--text-muted); text-align: right; margin-top: 12px; letter-spacing: 1px; }
    .loading { text-align: center; padding: 40px; color: var(--text-muted); font-size: 16px; letter-spacing: 1px; }

    .footer { margin-top: 40px; padding-top: 16px; border-top: 1px solid var(--border); }
    .footer p { font-size: 12px; color: var(--text-muted); letter-spacing: 1px; text-transform: uppercase; }
    .footer a { color: var(--text-muted); text-decoration: none; }
    .footer a:hover { color: var(--gold); }
  </style>
</head>
<body>
<div class="page">

  <div class="header">
    <div>
      <h1>FIFA World Cup 2026</h1>
      <div class="sub">Golden Boot Race &bull; Top Scorers</div>
      <div class="nav-row">
        <a href="https://kingdoggydog.github.io/worldcup2026/" class="nav-btn">&#128197; Schedule</a>
        <a href="https://kingdoggydog.github.io/worldcup2026/groups.html" class="nav-btn">&#128202; Groups</a>
        <a href="https://kingdoggydog.github.io/worldcup2026/bracket.html" class="nav-btn">&#127942; Knockout</a>
        <a href="https://kingdoggydog.github.io/worldcup2026/scorers.html" class="nav-btn active">&#9917; Top Scorers</a>
      </div>
    </div>
  </div>

  <div class="top-mask"></div>
  <div class="legend-bar">
    <span><span class="legend-icon">⚽</span> Goals</span>
    <span><span class="legend-icon">🅰️</span> Assists</span>
    <span><span class="legend-icon">🎯</span> Penalties</span>
    <span><span class="legend-icon">MP</span> Matches Played</span>
  </div>
  <div id="scorers-container" class="loading">Loading scorers...</div>
  <div class="last-updated" id="last-updated"></div>

  <div class="footer">
    <p>
      <a href="https://www.reddit.com/user/coolcato" target="_blank">&#128075; Made by u/coolcato</a>
    </p>
  </div>

</div>

<script>
const FLAGS = {
  'Algeria':'dz','Argentina':'ar','Australia':'au','Austria':'at','Belgium':'be',
  'Bosnia-H.':'ba','Bosnia':'ba','Brazil':'br','Canada':'ca','Cape Verde':'cv',
  'Colombia':'co','Congo DR':'cd','Croatia':'hr','Curacao':'cw','Czechia':'cz',
  'Ecuador':'ec','Egypt':'eg','England':'gb-eng','France':'fr','Germany':'de',
  'Ghana':'gh','Haiti':'ht','Iran':'ir','Iraq':'iq','Ivory Coast':'ci','Japan':'jp',
  'Jordan':'jo','Mexico':'mx','Morocco':'ma','Netherlands':'nl','New Zealand':'nz',
  'Norway':'no','Panama':'pa','Paraguay':'py','Portugal':'pt','Qatar':'qa',
  'Saudi Arabia':'sa','Scotland':'gb-sct','Senegal':'sn','South Africa':'za',
  'Korea Republic':'kr','South Korea':'kr','Spain':'es','Sweden':'se',
  'Switzerland':'ch','Tunisia':'tn','Turkey':'tr','Turkiye':'tr',
  'USA':'us','United States':'us','Uruguay':'uy','Uzbekistan':'uz'
};

function flagImg(shortName) {
  const code = FLAGS[shortName];
  return code ? `<img src="https://flagcdn.com/w20/${code}.png" alt="${shortName}" style="width:16px;height:12px;object-fit:contain;">` : '';
}

function posClass(i) {
  if (i === 0) return 'gold';
  if (i === 1) return 'silver';
  if (i === 2) return 'bronze';
  return '';
}

async function loadScorers() {
  try {
    const res = await fetch('scorers.json?t=' + Date.now());
    const data = await res.json();
    const scorers = (data.scorers || []).sort((a, b) => {
      if (b.goals !== a.goals) return b.goals - a.goals;
      return (b.assists ?? 0) - (a.assists ?? 0);
    });

    if (scorers.length === 0) {
      document.getElementById('scorers-container').innerHTML = '<div class="loading">No scorers yet — check back once matches are played.</div>';
      return;
    }

    let html = `<table class="scorers-table">
      <thead>
        <tr>
          <th class="center">#</th>
          <th>Player</th>
          <th class="center">⚽<br><span class="sublabel" style="font-size:9px;letter-spacing:1px;">GOALS</span></th>
          <th class="center">🅰️<br><span class="sublabel" style="font-size:9px;letter-spacing:1px;">ASSISTS</span></th>
          <th class="center col-pens">🎯<br><span class="sublabel" style="font-size:9px;letter-spacing:1px;">PENS</span></th>
          <th class="center col-mp"><span style="font-size:11px;letter-spacing:1px;">MP</span><br><span class="sublabel" style="font-size:9px;letter-spacing:1px;">PLAYED</span></th>
        </tr>
      </thead>
      <tbody>`;

    scorers.forEach((s, i) => {
      const player = s.player;
      const team = s.team;
      const flag = flagImg(team.shortName);
      // Show = for tied positions
      const prev = i > 0 ? scorers[i-1] : null;
      const tied = prev && s.goals === prev.goals && (s.assists ?? 0) === (prev.assists ?? 0);
      const posDisplay = tied ? '=' : (i + 1);
      html += `<tr>
        <td class="pos ${posClass(i)}">${posDisplay}</td>
        <td style="text-align:left;">
          <div class="player-name">${player.name}</div>
          <div class="player-team">${flag} ${team.shortName}</div>
        </td>
        <td class="goals">${s.goals ?? '-'}</td>
        <td class="stat">${s.assists ?? '-'}</td>
        <td class="stat col-pens">${s.penalties ?? '-'}</td>
        <td class="stat col-mp">${s.playedMatches ?? '-'}</td>
      </tr>`;
    });

    html += '</tbody></table>';
    document.getElementById('scorers-container').innerHTML = html;
    document.getElementById('last-updated').textContent = 'Updated ' + new Date().toLocaleTimeString();

  } catch(e) {
    document.getElementById('scorers-container').innerHTML = '<div class="loading">Could not load scorers. Try again shortly.</div>';
  }
}

// Stick the table header right below the legend bar, whatever height the legend
// happens to render at (varies slightly between desktop/mobile font sizes).
loadScorers();
setInterval(loadScorers, 60000);
</script>
</body>
</html>
