  <style>
    :root {
      --bg: #0A0E1A; --surface: #111827; --border: #1E2840;

      --gold: #C9A84C; --win: #2ECC71;
      --ctrl-bg: #1A2235; --ctrl-border: #2A3A55; --ctrl-text: #C8D0E0;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { overflow-x: hidden; width: 100%; }
    body { background: var(--bg); color: var(--text); font-family: 'Roboto Condensed', sans-serif; min-height: 100vh; }

      /* Explicit width on every column - table-layout:fixed needs this on ALL

    .header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 20px; padding-bottom: 16px; border-bottom: 1px solid var(--border); }
    .header h1 { font-weight: 800; font-size: clamp(22px,5vw,36px); letter-spacing: 1px; text-transform: uppercase; line-height: 1; color: var(--gold); }
    .header .sub { font-size: clamp(11px,2vw,14px); font-weight: 400; letter-spacing: 2px; text-transform: uppercase; color: var(--text-sub); margin-top: 4px; }
    .nav-row { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; }
    .nav-btn { font-family: 'Roboto Condensed', sans-serif; font-weight: 700; font-size: clamp(10px,1.5vw,13px); letter-spacing: 0.5px; text-transform: uppercase; padding: 5px 10px; border-radius: 4px; cursor: pointer; border: 1.5px solid var(--ctrl-border); background: var(--ctrl-bg); color: var(--ctrl-text); text-decoration: none; transition: all 0.2s; white-space: nowrap; display: inline-block; }

    /* Legend bar (mobile only, NOT sticky) + sticky table header (th-level, with iOS fix) */
    .legend-bar { display: none; }
    .legend-icon { display: inline-block; margin-right: 4px; font-weight: 700; color: var(--gold); }

      position: fixed; top: 0; left: 0; right: 0;
      height: 38px;
      background: var(--bg);

    }
    @media (max-width: 600px) {
      .legend-bar {
        display: flex; flex-wrap: wrap; gap: 10px;
        align-items: center;
        padding: 8px 10px;
        background: var(--surface);

    .scorers-table td { padding: 12px 12px; border-bottom: 1px solid var(--border); font-size: 16px; color: var(--text); vertical-align: middle; text-align: center; }

    .pos { font-size: 13px; color: var(--text-muted); font-weight: 700; text-align: center; width: 30px; }

<body>

<div class="page">

      <h1>FIFA World Cup 2026</h1>
      <div class="sub">Гонка за Золотую бутсу &bull; лучшие бомбардиры</div>

</div>

<script>
const FLAGS = {
  'Algeria':'dz','Argentina':'ar','Australia':'au','Austria':'at','Belgium':'be',
  'Bosnia-H.':'ba','Bosnia':'ba','Brazil':'br','Canada':'ca','Cape Verde':'cv',
  'Colombia':'co','Congo DR':'cd','Croatia':'hr','Curacao':'cw','Czechia':'cz',
  'Ecuador':'ec','Egypt':'eg','England':'gb-eng','France':'fr','Germany':'de',
  'Ghana':'gh','Haiti':'ht','Iran':'ir','Iraq':'iq','Ivory Coast':'ci','Japan':'jp',
  'Jordan':'jo','Mexico':'mx','Morocco':'ma','Netherlands':'nl','New Zealand':'nz',
  'Norway':'no','Panama':'pa','Paraguay':'py','Portugal':'pt','Qatar':'qa',
  'Saudi Arabia':'sa','Scotland':'gb-sct','Senegal':'sn','South Africa':'za',
  'Korea Republic':'kr','South Korea':'kr','Spain':'es','Sweden':'se',
  'Switzerland':'ch','Tunisia':'tn','Turkey':'tr','Turkiye':'tr',
  'USA':'us','United States':'us','Uruguay':'uy','Uzbekistan':'uz'
};
const TEAM_RU = {
  'Algeria':'Алжир','Argentina':'Аргентина','Australia':'Австралия','Austria':'Австрия','Belgium':'Бельгия',
  'Bosnia-H.':'Босния и Герцеговина','Bosnia':'Босния и Герцеговина','Brazil':'Бразилия','Canada':'Канада',
  'Cape Verde':'Кабо-Верде','Colombia':'Колумбия','Congo DR':'ДР Конго','Croatia':'Хорватия','Curacao':'Кюрасао',
  'Czechia':'Чехия','Ecuador':'Эквадор','Egypt':'Египет','England':'Англия','France':'Франция','Germany':'Германия',
  'Ghana':'Гана','Haiti':'Гаити','Iran':'Иран','Iraq':'Ирак','Ivory Coast':'Кот-д’Ивуар','Japan':'Япония',
  'Jordan':'Иордания','Mexico':'Мексика','Morocco':'Марокко','Netherlands':'Нидерланды','New Zealand':'Новая Зеландия',
  'Norway':'Норвегия','Panama':'Панама','Paraguay':'Парагвай','Portugal':'Португалия','Qatar':'Катар',
  'Saudi Arabia':'Саудовская Аравия','Scotland':'Шотландия','Senegal':'Сенегал','South Africa':'ЮАР',
  'Korea Republic':'Южная Корея','South Korea':'Южная Корея','Spain':'Испания','Sweden':'Швеция',
  'Switzerland':'Швейцария','Tunisia':'Тунис','Turkey':'Турция','Turkiye':'Турция','USA':'США',
  'United States':'США','Uruguay':'Уругвай','Uzbekistan':'Узбекистан'
};

function flagImg(shortName) {
  const code = FLAGS[shortName];
  return code ? `<img src="https://flagcdn.com/w20/${code}.png" alt="${shortName}" style="width:16px;height:12px;object-fit:contain;">` : '';
}

function posClass(i) {
  if (i === 0) return 'gold';
  if (i === 1) return 'silver';
  if (i === 2) return 'bronze';
  return '';
}

async function loadScorers() {
  try {
    const res = await fetch('../scorers.json?t=' + Date.now(), {cache:'no-store'});
    const data = await res.json();
    const scorers = (data.scorers || []).sort((a, b) => {
      if (b.goals !== a.goals) return b.goals - a.goals;
      return (b.assists ?? 0) - (a.assists ?? 0);
    });

    if (scorers.length === 0) {
      document.getElementById('scorers-container').innerHTML = '<div class="loading">Бомбардиров пока нет.</div>';
      return;
    }

    let html = `<table class="scorers-table">
      <thead>
        <tr>
          <th class="center col-pos">#</th>
          <th class="col-player">Игрок</th>
          <th class="center col-goals">Г<br><span class="sublabel" style="font-size:9px;letter-spacing:1px;">ГОЛЫ</span></th>
          <th class="center col-assists">А<br><span class="sublabel" style="font-size:9px;letter-spacing:1px;">ПЕРЕДАЧИ</span></th>
          <th class="center col-pens">П<br><span class="sublabel" style="font-size:9px;letter-spacing:1px;">ПЕНАЛЬТИ</span></th>
          <th class="center col-mp"><span style="font-size:11px;letter-spacing:1px;">И</span><br><span class="sublabel" style="font-size:9px;letter-spacing:1px;">МАТЧИ</span></th>
        </tr>
      </thead>
      <tbody>`;

    scorers.forEach((s, i) => {
      const player = s.player;
      const team = s.team;
      const flag = flagImg(team.shortName);
      // Show = for tied positions
      const prev = i > 0 ? scorers[i-1] : null;
      const tied = prev && s.goals === prev.goals && (s.assists ?? 0) === (prev.assists ?? 0);
      const posDisplay = tied ? '=' : (i + 1);
      html += `<tr>
        <td class="pos col-pos ${posClass(i)}">${posDisplay}</td>
        <td class="col-player" style="text-align:left;">
          <div class="player-name">${player.name}</div>
          <div class="player-team">${flag} ${TEAM_RU[team.shortName] || team.shortName}</div>
        </td>
        <td class="goals col-goals">${s.goals ?? '-'}</td>
        <td class="stat col-assists">${s.assists ?? '-'}</td>
        <td class="stat col-pens">${s.penalties ?? '-'}</td>
        <td class="stat col-mp">${s.playedMatches ?? '-'}</td>
      </tr>`;
    });

    html += '</tbody></table>';
    document.getElementById('scorers-container').innerHTML = html;
    document.getElementById('last-updated').textContent = 'Обновлено: ' + new Date().toLocaleTimeString('ru-RU');

  } catch(e) {
    document.getElementById('scorers-container').innerHTML = '<div class="loading">Не удалось загрузить данные. Попробуйте позже.</div>';
  }
}

loadScorers();
setInterval(loadScorers, 30000);
</script>
